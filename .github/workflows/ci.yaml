name: Build and Push Docker image

on:
 push:
  branches: [ main ]

jobs:
 build-and-push:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout code
     uses: actions/checkout@v4
     #git clone https://github.com/your-name/your-repo.working-directory:
     #cd your repo

   - name: Login to Docker Hub
     uses: docker/login-action@v3
     with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

   - name: Generate timestamp tag
     run: echo "VERSION=$(date + '%y-%m-%d-%H%M%S')" >> $GITHUB-env
    #version=2025-12-11-1443025
    #nandiniamgoth/hello-world:2025-12-11-090512

   - name: Build and Push image
     run: 
      docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:${{ env.VERSION }} .
      docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:${{ env.VERSION }}
